build:
  image: smjoao/osto:latest
  script:
    - echo "Building solver"
    - cmake -S . -B build
    - cmake --build build -j10
    - cmake --install build
  artifacts:
    paths:
      - bin/

test_numeric:
  image: smjoao/osto:latest
  script:
    - cd numeric/tests
    - cmake -S . -B build
    - cmake --build build
    - build/numbers_test


test_state:
  image: smjoao/osto:latest
  script:
    - cd state/tests
    - cmake -S . -B build
    - cmake --build build
    - build/state_test


