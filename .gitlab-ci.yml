stages:
  - build
  - test

build_numeric:
  stage: build
  image: gcc:latest
  script:
    - echo "Building Numeric library"
    - cd numeric
    - cmake -S . -B build
    - cmake --build build
    - cmake --install build
  artifacts:
    paths:
      - lib/

test_numeric:
  stage: test
  image: gcc:latest
  script:
    - cd numeric/tests
    - cmake -S . -B build
    - cmake --build build
    - build/numbers_test
    